<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Good — Милый мессенджер</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg-color: #f7f8fc;
      --card-bg: rgba(255, 255, 255, 0.9);
      --text-color: #2d3748;
      --text-secondary: #718096;
      --header-bg: rgba(255, 255, 255, 0.85);
      --input-bg: #edf2f7;
      --input-border: #e2e8f0;
      --message-my: linear-gradient(135deg, #667eea, #764ba2);
      --message-other: #edf2f7;
      --message-other-text: #2d3748;
      --sidebar-bg: #ffffff;
      --contact-bg: #f7f9fc;
      --accent-color: #7f5af0;
    }

    [data-theme="dark"] {
      --bg-color: #1a1b26;
      --card-bg: rgba(26, 27, 38, 0.9);
      --text-color: #a9b1d6;
      --text-secondary: #787c99;
      --header-bg: rgba(26, 27, 38, 0.85);
      --input-bg: #24283b;
      --input-border: #414868;
      --message-my: linear-gradient(135deg, #7f5af0, #2cb67d);
      --message-other: #24283b;
      --message-other-text: #c0caf5;
      --sidebar-bg: #16161e;
      --contact-bg: #1a1b26;
      --accent-color: #7f5af0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; transition: background 0.3s, color 0.3s, border 0.3s; }
    body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100vh; position: relative; overflow: hidden; font-size: 14px; }
    
    /* МЯГКИЙ, УЮТНЫЙ ФОН */
    .bg-decor { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
    .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.25; animation: floatBlob infinite ease-in-out alternate; }
    .blob-1 { width: 300px; height: 300px; background: #7f5af0; top: -10%; left: -10%; animation-duration: 12s; }
    .blob-2 { width: 350px; height: 350px; background: #2cb67d; bottom: -10%; right: -10%; animation-duration: 15s; }
    @keyframes floatBlob { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 40px) scale(1.05); } }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* АВТОРИЗАЦИЯ */
    #auth-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(10px); background: rgba(0,0,0,0.2); }
    .auth-box { background: var(--card-bg); padding: 35px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 90%; max-width: 360px; display: flex; flex-direction: column; gap: 18px; text-align: center; border: 1px solid var(--input-border); }
    .auth-box h2 { color: var(--text-color); font-size: 1.8rem; font-weight: 700; letter-spacing: 0.5px; }
    .auth-box input { width: 100%; padding: 13px 15px; border-radius: 14px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color); outline: none; font-size: 0.95rem; text-align: center; }
    .auth-box input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(127,90,240,0.15); }
    .auth-buttons { display: flex; gap: 10px; }
    .auth-buttons button { flex: 1; padding: 13px; border-radius: 14px; border: none; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    #login-btn { background: var(--accent-color); color: white; box-shadow: 0 4px 12px rgba(127,90,240,0.3); }
    #register-btn { background: transparent; border: 2px solid var(--accent-color); color: var(--accent-color); }

    /* САЙДБАР (ГЛАВНОЕ МЕНЮ) */
    #sidebar { position: absolute; left: 0; top: 0; width: 280px; height: 100%; background: var(--sidebar-bg); z-index: 50; border-right: 1px solid var(--input-border); display: flex; flex-direction: column; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 5px 0 20px rgba(0,0,0,0.05); }
    #sidebar.open { transform: translateX(0); }
    .sidebar-header { padding: 18px; border-bottom: 1px solid var(--input-border); display: flex; justify-content: space-between; align-items: center; font-weight: 600; color: var(--accent-color); }
    
    .profile-card { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--input-border); background: var(--contact-bg); }
    .avatar-container { position: relative; width: 50px; height: 50px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent-color); cursor: pointer; flex-shrink: 0; }
    .avatar-container img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-container input { position: absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer; }
    .profile-info h4 { font-size: 0.95rem; color: var(--text-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px; font-weight: 600; }
    .profile-info span { font-size: 0.75rem; color: #2cb67d; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    .online-dot { width: 7px; height: 7px; background: #2cb67d; border-radius: 50%; display: inline-block; }

    .sidebar-content { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .menu-section-title { font-size: 0.75rem; color: var(--text-secondary); margin: 10px 0 4px 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
    .contact-item, .admin-user-card { background: var(--contact-bg); padding: 11px 14px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; border: 1px solid var(--input-border); cursor: pointer; }
    .contact-item:hover { background: rgba(127,90,240,0.08); }
    .ban-btn { background: #ff5555; color: #fff; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 600; }

    /* ЧАТ */
    #main-container { display: none; flex-direction: column; height: 100vh; position: relative; z-index: 10; width: 100%; }
    header { background: var(--header-bg); backdrop-filter: blur(10px); padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--input-border); }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-left h3 { font-size: 1.1rem; font-weight: 600; }
    .header-right { display: flex; gap: 12px; align-items: center; }
    .top-action-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.1rem; cursor: pointer; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .top-action-btn:hover { background: var(--input-bg); color: var(--accent-color); }
    #logout-btn { background: transparent; color: #ff5555; border: none; font-size: 0.85rem; cursor: pointer; font-weight: 600; padding: 6px 10px; border-radius: 8px; }
    #logout-btn:hover { background: rgba(255,85,85,0.1); }

    #typing-indicator { font-size: 0.75rem; color: #2cb67d; height: 14px; margin-top: 2px; font-style: italic; }

    #chat-box { flex: 1; padding: 18px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .message { padding: 12px 16px; border-radius: 16px; max-width: 75%; font-size: 0.92rem; line-height: 1.4; word-break: break-word; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.03); display: flex; flex-direction: column; gap: 5px; animation: fadeIn 0.25s ease-out; cursor: pointer; }
    .message.my { background: var(--message-my); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.other { background: var(--message-other); color: var(--message-other-text); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--input-border); }
    
    .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
    .msg-avatar { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.2); }
    .author { font-size: 0.75rem; color: var(--accent-color); font-weight: 700; }
    .message.my .author { color: #f0f4f8; }

    .reply-preview-box { background: rgba(0,0,0,0.08); border-left: 3px solid var(--accent-color); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; opacity: 0.85; margin-bottom: 2px; }
    .active-reply-banner { display: none; padding: 8px 16px; background: var(--card-bg); border-top: 1px solid var(--input-border); justify-content: space-between; align-items: center; font-size: 0.85rem; }

    .delete-msg-btn { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--text-secondary); font-size: 0.8rem; cursor: pointer; }
    .delete-msg-btn:hover { color: #ff5555; }
    
    .chat-img { max-width: 200px; border-radius: 12px; display: block; border: 1px solid var(--input-border); margin-top: 4px; }

    /* ЭМОДЗИ ПАНЕЛЬ */
    #emoji-picker { display: flex; gap: 8px; padding: 8px 16px; background: var(--header-bg); border-top: 1px solid var(--input-border); overflow-x: auto; align-items: center; }
    .emoji-btn { background: none; border: none; font-size: 1.15rem; cursor: pointer; transition: transform 0.15s; padding: 3px; }
    .emoji-btn:hover { transform: scale(1.25); }
    .vip-emoji-btn { background: linear-gradient(135deg, #ffd700, #ffa500); border: none; font-size: 0.8rem; padding: 4px 10px; border-radius: 14px; cursor: pointer; font-weight: 700; color: #1a1b26; display: none; box-shadow: 0 2px 8px rgba(255,215,0,0.4); flex-shrink: 0; }

    /* АУДИОПЛЕЕР */
    .custom-voice-player { display: flex; align-items: center; gap: 10px; min-width: 160px; padding: 4px 0; }
    .play-voice-btn { background: var(--accent-color); color: #fff; border: none; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.85rem; box-shadow: 0 2px 6px rgba(127,90,240,0.3); flex-shrink: 0; }
    .message.my .play-voice-btn { background: #ffffff; color: var(--accent-color); }
    .voice-waves { font-size: 0.8rem; letter-spacing: 1.5px; opacity: 0.85; font-family: monospace; }

    /* НИЖНЯЯ ПАНЕЛЬ ВВОДА */
    #input-area { display: flex; align-items: center; padding: 12px 18px; background: var(--header-bg); backdrop-filter: blur(10px); border-top: 1px solid var(--input-border); gap: 10px; }
    .icon-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; display: flex; justify-content: center; align-items: center; width: 40px; height: 40px; border-radius: 50%; background: var(--input-bg); border: 1px solid var(--input-border); flex-shrink: 0; }
    .icon-btn:hover { color: var(--accent-color); border-color: var(--accent-color); background: rgba(127,90,240,0.05); }
    #message-input { flex: 1; padding: 12px 18px; border: 1px solid var(--input-border); border-radius: 22px; background: var(--input-bg); color: var(--text-color); outline: none; font-size: 0.95rem; }
    #message-input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(127,90,240,0.15); }
    #send-btn { background: var(--accent-color); color: #fff; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 12px rgba(127,90,240,0.3); flex-shrink: 0; }
    #send-btn i { font-size: 1rem; transform: translateX(-1px); }
    #send-btn:hover { transform: scale(1.05); }
  </style>
</head>
<body data-theme="dark">
  <div class="bg-decor">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <!-- АВТОРИЗАЦИЯ -->
  <div id="auth-screen">
    <div class="auth-box">
      <h2>Good 🌸</h2>
      <input type="text" id="username-input" placeholder="Твой никнейм">
      <input type="password" id="password-input" placeholder="Пароль">
      <div class="auth-buttons">
        <button id="login-btn">Войти</button>
        <button id="register-btn">Регистрация</button>
      </div>
    </div>
  </div>

  <!-- САЙДБАР -->
  <div id="sidebar">
    <div class="sidebar-header">
      <span>Меню</span>
      <button class="top-action-btn" id="close-sidebar"><i class="fas fa-times"></i></button>
    </div>
    
    <div class="profile-card">
      <div class="avatar-container" title="Сменить аватарку">
        <img id="user-avatar-img" src="https://via.placeholder.com/150" alt="Аватар">
        <input type="file" id="avatar-file-input" accept="image/*">
      </div>
      <div class="profile-info">
        <h4 id="sidebar-my-name">Имя</h4>
        <span><span class="online-dot"></span> Online</span>
      </div>
    </div>

    <div class="sidebar-content" id="sidebar-list"></div>
  </div>

  <!-- ЧАТ -->
  <div id="main-container">
    <header>
      <div class="header-left">
        <button class="top-action-btn" id="menu-btn" title="Меню"><i class="fas fa-bars"></i></button>
        <div>
          <h3 id="current-chat-title">Общий чат Good</h3>
          <div id="typing-indicator"></div>
        </div>
      </div>
      <div class="header-right">
        <button class="top-action-btn" id="theme-toggle-btn" title="Тема"><i class="fas fa-moon"></i></button>
        <button class="top-action-btn" id="call-btn" title="Звонок"><i class="fas fa-phone-alt"></i></button>
        <button class="top-action-btn" id="video-call-btn" title="Видеозвонок"><i class="fas fa-video"></i></button>
        <button id="logout-btn">Выйти</button>
      </div>
    </header>
    
    <div id="chat-box"></div>

    <div class="active-reply-banner" id="active-reply-banner">
      <div>Ответ на: <span id="reply-to-text" style="color:var(--accent-color); font-weight:600;"></span></div>
      <button id="cancel-reply-btn" style="background:none; border:none; color:#ff5555; cursor:pointer; font-weight:bold;">✕</button>
    </div>

    <div id="emoji-picker">
      <button class="vip-emoji-btn" id="vip-emoji-btn">👑 VIP</button>
      <button class="emoji-btn">🌸</button>
      <button class="emoji-btn">💖</button>
      <button class="emoji-btn">✨</button>
      <button class="emoji-btn">🔥</button>
      <button class="emoji-btn">😂</button>
      <button class="emoji-btn">👍</button>
      <button class="emoji-btn">😎</button>
      <button class="emoji-btn">🎉</button>
      <button class="emoji-btn">💯</button>
    </div>
    
    <div id="input-area">
      <label class="icon-btn" title="Фото">
        <i class="fas fa-image"></i>
        <input type="file" id="image-input" accept="image/*" style="display: none;">
      </label>
      <button class="icon-btn" id="mic-btn" title="Голосовое">
        <i class="fas fa-microphone"></i>
      </button>
      <input type="text" id="message-input" placeholder="Напиши сообщение...">
      <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDZ5G4pBPLlzTd9QL5ikBM0tgNNwJHtkmE",
      authDomain: "chat-ba2e0.firebaseapp.com",
      projectId: "chat-ba2e0",
      storageBucket: "chat-ba2e0.firebasestorage.app",
      messagingSenderId: "781903850019",
      appId: "1:781903850019:web:477a8a299ab34270afdf96"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const authScreen = document.getElementById('auth-screen');
    const mainContainer = document.getElementById('main-container');
    const usernameInput = document.getElementById('username-input');
    const passwordInput = document.getElementById('password-input');
    const loginBtn = document.getElementById('login-btn');
    const registerBtn = document.getElementById('register-btn');
    const logoutBtn = document.getElementById('logout-btn');

    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const micBtn = document.getElementById('mic-btn');
    const imageInput = document.getElementById('image-input');
    const avatarFileInput = document.getElementById('avatar-file-input');
    const userAvatarImg = document.getElementById('user-avatar-img');
    const sidebarMyName = document.getElementById('sidebar-my-name');

    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menu-btn');
    const closeSidebar = document.getElementById('close-sidebar');
    const sidebarList = document.getElementById('sidebar-list');
    const currentChatTitle = document.getElementById('current-chat-title');
    const callBtn = document.getElementById('call-btn');
    const videoCallBtn = document.getElementById('video-call-btn');
    const themeToggleBtn = document.getElementById('theme-toggle-btn');
    const typingIndicator = document.getElementById('typing-indicator');

    const activeReplyBanner = document.getElementById('active-reply-banner');
    const replyToText = document.getElementById('reply-to-text');
    const cancelReplyBtn = document.getElementById('cancel-reply-btn');
    const vipEmojiBtn = document.getElementById('vip-emoji-btn');

    let usersAvatars = {};
    let replyingToMessage = null;

    function resizeImage(file, maxWidth = 180, maxHeight = 180) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            if (width > height) {
              if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
            } else {
              if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
          };
        };
      });
    }

    const bodyEl = document.body;
    const savedTheme = localStorage.getItem('goodTheme') || 'dark';
    bodyEl.setAttribute('data-theme', savedTheme);
    themeToggleBtn.innerHTML = savedTheme === 'light' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';

    themeToggleBtn.addEventListener('click', () => {
      const currentTheme = bodyEl.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      bodyEl.setAttribute('data-theme', newTheme);
      localStorage.setItem('goodTheme', newTheme);
      themeToggleBtn.innerHTML = newTheme === 'light' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    });

    let myUsername = localStorage.getItem('myUsername');
    let currentChatRoom = "global_chat";

    if (myUsername) {
      checkUserAccess();
    }

    async function checkUserAccess() {
      const userRef = doc(db, "users", myUsername);
      const snap = await getDoc(userRef);
      if (snap.exists() && snap.data().banned) {
        alert("Аккаунт заблокирован!");
        localStorage.removeItem('myUsername');
        location.reload();
        return;
      }
      
      if (snap.exists() && snap.data().avatar) {
        userAvatarImg.src = snap.data().avatar;
      }
      sidebarMyName.textContent = myUsername;

      if (myUsername === "MilkyVIP") {
        vipEmojiBtn.style.display = 'inline-block';
      }

      authScreen.style.display = 'none';
      mainContainer.style.display = 'flex';
      preloadUsersData();
      initTypingListener();
    }

    function preloadUsersData() {
      onSnapshot(collection(db, "users"), (snapshot) => {
        usersAvatars = {};
        snapshot.forEach((docSnap) => {
          usersAvatars[docSnap.id] = docSnap.data().avatar || "";
        });
        loadMessages();
      });
    }

    messageInput.addEventListener('input', async () => {
      if (!myUsername) return;
      await setDoc(doc(db, "typing", myUsername), { user: myUsername, time: serverTimestamp() }, { merge: true });
    });

    function initTypingListener() {
      onSnapshot(collection(db, "typing"), (snapshot) => {
        let typingUsers = [];
        snapshot.forEach((d) => {
          const data = d.data();
          if (data.user && data.user !== myUsername) {
            typingUsers.push(data.user);
          }
        });
        if (typingUsers.length > 0) {
          typingIndicator.textContent = `${typingUsers.join(', ')} печатает...`;
        } else {
          typingIndicator.textContent = '';
        }
      });
    }

    avatarFileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (file) {
        const compressedBase64 = await resizeImage(file, 120, 120);
        userAvatarImg.src = compressedBase64;
        await setDoc(doc(db, "users", myUsername), { avatar: compressedBase64 }, { merge: true });
      }
    });

    registerBtn.addEventListener('click', async () => {
      const name = usernameInput.value.trim();
      const pass = passwordInput.value.trim();
      if (!name || !pass) { alert('Заполни поля!'); return; }
      
      const userRef = doc(db, "users", name);
      const userSnap = await getDoc(userRef);
      if (userSnap.exists()) {
        alert('Ник занят!');
      } else {
        await setDoc(userRef, { password: pass, banned: false, avatar: "" });
        localStorage.setItem('myUsername', name);
        myUsername = name;
        checkUserAccess();
      }
    });

    loginBtn.addEventListener('click', async () => {
      const name = usernameInput.value.trim();
      const pass = passwordInput.value.trim();
      if (!name || !pass) { alert('Заполни поля!'); return; }

      const userRef = doc(db, "users", name);
      const userSnap = await getDoc(userRef);
      if (!userSnap.exists()) {
        alert('Ник не найден!');
      } else {
        const data = userSnap.data();
        if (data.banned) { alert('Заблокирован!'); return; }
        if (data.password === pass) {
          localStorage.setItem('myUsername', name);
          myUsername = name;
          checkUserAccess();
        } else {
          alert('Неверный пароль!');
        }
      }
    });

    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('myUsername');
      location.reload();
    });

    document.querySelectorAll('.emoji-btn').forEach(btn => {
      btn.onclick = () => {
        messageInput.value += btn.textContent;
        messageInput.focus();
      };
    });

    vipEmojiBtn.onclick = () => {
      messageInput.value += " 👑 [VIP OWNER] ✨ ";
      messageInput.focus();
    };

    cancelReplyBtn.onclick = () => {
      replyingToMessage = null;
      activeReplyBanner.style.display = 'none';
    };

    menuBtn.addEventListener('click', async () => {
      sidebar.classList.add('open');
      sidebarList.innerHTML = '';

      const globalCard = document.createElement('div');
      globalCard.className = 'contact-item';
      globalCard.innerHTML = `<span><i class="fas fa-globe" style="color:var(--accent-color); margin-right:8px;"></i>Общий чат Good</span>`;
      globalCard.onclick = () => {
        currentChatRoom = "global_chat";
        currentChatTitle.textContent = "Общий чат Good";
        sidebar.classList.remove('open');
        loadMessages();
      };
      sidebarList.appendChild(globalCard);

      const title1 = document.createElement('div');
      title1.className = 'menu-section-title';
      title1.textContent = "Личные сообщения";
      sidebarList.appendChild(title1);

      const usersQuery = collection(db, "users");
      onSnapshot(usersQuery, (snapshot) => {
        const existingItems = sidebarList.querySelectorAll('.dynamic-contact');
        existingItems.forEach(el => el.remove());

        snapshot.forEach((uDoc) => {
          const uName = uDoc.id;
          if (uName === myUsername) return;

          const contactCard = document.createElement('div');
          contactCard.className = 'contact-item dynamic-contact';
          contactCard.innerHTML = `<span><i class="fas fa-user-circle" style="color:var(--accent-color); margin-right:8px;"></i>${uName}</span>`;
          contactCard.onclick = () => {
            const roomMembers = [myUsername, uName].sort();
            currentChatRoom = `pm_${roomMembers[0]}_${roomMembers[1]}`;
            currentChatTitle.textContent = `ЛС с ${uName}`;
            sidebar.classList.remove('open');
            loadMessages();
          };
          sidebarList.appendChild(contactCard);
        });

        if (myUsername === "MilkyVIP") {
          let title2 = sidebarList.querySelector('.admin-title');
          if (!title2) {
            title2 = document.createElement('div');
            title2.className = 'menu-section-title admin-title';
            title2.textContent = "👑 Управление чатом";
            sidebarList.appendChild(title2);
          }

          const existingAdmins = sidebarList.querySelectorAll('.dynamic-admin');
          existingAdmins.forEach(el => el.remove());

          snapshot.forEach((uDoc) => {
            const uData = uDoc.data();
            const uName = uDoc.id;

            const adminCard = document.createElement('div');
            adminCard.className = 'admin-user-card dynamic-admin';
            adminCard.innerHTML = `
              <div>
                <div style="font-weight:600;">${uName} ${uData.banned ? '<span style="color:#ff5555">(Бан)</span>' : ''}</div>
              </div>
              ${uName !== "MilkyVIP" ? `<button class="ban-btn" style="background:${uData.banned ? '#2cb67d' : '#ff5555'}">${uData.banned ? 'Разбан' : 'Бан'}</button>` : ''}
            `;

            const banButton = adminCard.querySelector('.ban-btn');
            if (banButton) {
              banButton.onclick = async () => {
                await setDoc(doc(db, "users", uName), { banned: !uData.banned }, { merge: true });
              };
            }

            sidebarList.appendChild(adminCard);
          });
        }
      });
    });

    closeSidebar.addEventListener('click', () => { sidebar.classList.remove('open'); });

    function openSecureCall() {
      const roomName = "GoodChatRoom_" + currentChatRoom;
      window.open(`https://meet.jit.si/${roomName}`, '_blank');
    }

    callBtn.addEventListener('click', openSecureCall);
    videoCallBtn.addEventListener('click', openSecureCall);

    let unsubscribeMessages = null;

    function loadMessages() {
      const q = query(collection(db, "messages"), orderBy("createdAt"));
      if (unsubscribeMessages) unsubscribeMessages();

      unsubscribeMessages = onSnapshot(q, (snapshot) => {
        chatBox.innerHTML = ''; 
        snapshot.forEach((docSnap) => {
          const data = docSnap.data();

          const msgRoom = data.room || "global_chat";
          if (msgRoom !== currentChatRoom) return;

          const newMessage = document.createElement('div');
          newMessage.className = data.username === myUsername ? 'message my' : 'message other';
          
          newMessage.onclick = () => {
            replyingToMessage = { user: data.username, text: data.text || 'Медиа' };
            replyToText.textContent = `${replyingToMessage.user}: ${replyingToMessage.text}`;
            activeReplyBanner.style.display = 'flex';
            messageInput.focus();
          };

          const msgHeader = document.createElement('div');
          msgHeader.className = 'msg-header';

          const avatarImg = document.createElement('img');
          avatarImg.className = 'msg-avatar';
          avatarImg.src = usersAvatars[data.username] || 'https://via.placeholder.com/150';
          msgHeader.appendChild(avatarImg);

          const authorEl = document.createElement('span');
          authorEl.className = 'author';
          authorEl.textContent = data.username || 'Аноним';
          msgHeader.appendChild(authorEl);

          newMessage.appendChild(msgHeader);

          if (data.replyTo) {
            const replyBox = document.createElement('div');
            replyBox.className = 'reply-preview-box';
            replyBox.textContent = `↩ ${data.replyTo}`;
            newMessage.appendChild(replyBox);
          }

          if (data.image) {
            const imgEl = document.createElement('img');
            imgEl.src = data.image;
            imgEl.className = 'chat-img';
            newMessage.appendChild(imgEl);
          } else if (data.audio) {
            const playerWrapper = document.createElement('div');
            playerWrapper.className = 'custom-voice-player';

            const playBtn = document.createElement('button');
            playBtn.className = 'play-voice-btn';
            playBtn.innerHTML = '<i class="fas fa-play"></i>';

            const waves = document.createElement('span');
            waves.className = 'voice-waves';
            waves.textContent = ' ▶ ▂▃▅';

            const audioElement = new Audio(data.audio);

            playBtn.onclick = (e) => {
              e.stopPropagation();
              if (audioElement.paused) {
                audioElement.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
              } else {
                audioElement.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
              }
            };

            audioElement.onended = () => { playBtn.innerHTML = '<i class="fas fa-play"></i>'; };

            playerWrapper.appendChild(playBtn);
            playerWrapper.appendChild(waves);
            newMessage.appendChild(playerWrapper);

          } else if (data.text) {
            const textEl = document.createElement('div');
            textEl.textContent = data.text;
            newMessage.appendChild(textEl);
          }
          
          if (myUsername === "MilkyVIP" || data.username === myUsername) {
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-msg-btn';
            delBtn.innerHTML = '<i class="fas fa-trash"></i>';
            delBtn.onclick = async (e) => {
              e.stopPropagation();
              if (confirm("Удалить?")) {
                await deleteDoc(doc(db, "messages", docSnap.id));
              }
            };
            newMessage.appendChild(delBtn);
          }
          
          chatBox.appendChild(newMessage);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
      });
    }

    async function sendMessage(payload) {
      let finalPayload = { 
        ...payload,
        room: currentChatRoom,
        username: myUsername, 
        createdAt: serverTimestamp() 
      };

      if (replyingToMessage) {
        finalPayload.replyTo = `${replyingToMessage.user}: ${replyingToMessage.text}`;
        replyingToMessage = null;
        activeReplyBanner.style.display = 'none';
      }

      await addDoc(collection(db, "messages"), finalPayload);
    }

    sendBtn.addEventListener('click', async () => {
      const text = messageInput.value.trim();
      if (text !== '') {
        messageInput.value = ''; 
        await sendMessage({ text: text });
      }
    });

    messageInput.addEventListener('keypress', async (e) => { 
      if (e.key === 'Enter') {
        const text = messageInput.value.trim();
        if (text !== '') {
          messageInput.value = ''; 
          await sendMessage({ text: text });
        }
      }
    });

    imageInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (file) {
        const compressedBase64 = await resizeImage(file, 500, 500);
        await sendMessage({ image: compressedBase64 });
      }
    });

    let mediaRecorder;
    let audioChunks = [];

    async function startRecording(event) {
      event.preventDefault(); 
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          audioChunks = [];
          const reader = new FileReader();
          reader.readAsDataURL(audioBlob);
          reader.onloadend = async () => {
            if (reader.result) {
              await sendMessage({ audio: reader.result });
            }
          };
          stream.getTracks().forEach(track => track.stop());
        };
        mediaRecorder.start();
        micBtn.style.color = '#ff5555'; 
      } catch (err) { console.warn("Микрофон недоступен", err); }
    }

    function stopRecording(event) {
      event.preventDefault();
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        micBtn.style.color = ''; 
      }
    }

    micBtn.addEventListener('mousedown', startRecording);
    micBtn.addEventListener('mouseup', stopRecording);
    micBtn.addEventListener('mouseleave', stopRecording);
    micBtn.addEventListener('touchstart', startRecording);
    micBtn.addEventListener('touchend', stopRecording);
    micBtn.addEventListener('touchcancel', stopRecording);
  </script>
</body>
</html>
